name: alson_education
description: A modern educational app with offline database support.

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  http: ^0.13.0
  file_picker: ^5.2.5 # تحديث إلى أحدث إصدار
  url_launcher: ^6.0.20
  intl: ^0.17.0
  excel: ^2.0.0-null-safety-3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/img/icon.png
    - assets/img/po.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
